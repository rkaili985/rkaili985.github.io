<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两对等位基因自由组合的模拟实验</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
        body{background:#f5f7fa;padding:24px;max-width:1300px;margin:0 auto;}
        h1{text-align:center;color:#233455;font-size:26px;margin-bottom:30px;font-weight:700;letter-spacing:1px;}

        .experiment-main{display:flex;align-items:center;justify-content:center;gap:30px;margin-bottom:40px;}
        .organ-label{text-align:center;font-size:16px;font-weight:600;color:#233455;margin-bottom:10px;}
        .group-box{display:flex;flex-direction:column;align-items:center;gap:25px;}

        .gene-produce-box{width:240px;height:65px;border:2px dashed #8092bb;border-radius:10px;background:#f9fbff;display:flex;align-items:center;justify-content:center;gap:10px;position:relative;box-shadow:0 3px 8px rgba(0,0,0,0.12);margin-top:15px;}
        .gen-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:14px;color:#333;font-weight:50px;white-space:nowrap;}

        /* 增大右侧雄桶宽度 */
        .bucket{
            width:260px;height:160px;
            border:2px solid #444;
            border-radius:20px 20px 70px 70px;
            background:linear-gradient(145deg,#e2e8f0,#cbd5e1);
            box-shadow:inset 5px 5px 12px rgba(255,255,255,0.65),
                       inset -5px -5px 12px rgba(0,0,0,0.25),
                       0 8px 20px rgba(0,0,0,0.35);
            display:flex;overflow:hidden;position:relative;
        }
        .bucket-male{
            width: 300px; /* 加宽雄桶 */
            background:linear-gradient(145deg,#e0e8f8,#c9d8f0);
            box-shadow:inset 5px 5px 12px rgba(255,255,250,0.65),
                       inset -5px -5px 12px rgba(0,0,0,0.25),
                       0 8px 20px rgba(0,0,0,0.35);
        }
        .bucket-title{position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:15px;font-weight:600;color:#233455;white-space:nowrap;}
        .split-line{width:3px;background:rgba(90,107,146,0.35);height:100%;margin:0 6px;}
        
        /* 左侧雌桶 B/b 区域：每行2个 */
        .female-b-box{
            flex:1;padding:10px;
            display:grid;
            grid-template-columns: repeat(2, 1fr);
            gap:8px;
            place-items:center;
        }

        /* 雄桶黄色小球区域：固定每行3个、整体居中 */
        .male-a-box{
            flex:1;padding:10px;
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            gap:8px;
            place-items: center;
        }

        /* 雄桶蓝色方块区域：改为每行3个、居中对齐 */
        #mZoneB{
            flex:1;padding:10px;
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            gap:8px;
            place-items: center;
        }

        /* 默认布局（雌桶A区保持不变） */
        .gene-area{
            flex:1;padding:10px;
            display:flex;flex-wrap:wrap;
            gap:6px;align-items:center;justify-content:center;
        }

        .gene-round{
            width:30px;height:30px;border-radius:50%;
            background:radial-gradient(circle at 30% 30%,#fff9c0,#ff9500);
            box-shadow:3px 3px 7px rgba(0,0,0,0.28),inset -2px -2px 5px rgba(0,0,0,0.18);
            color:#000;font-weight:bold;font-size:13px;
            display:flex;align-items:center;justify-content:center;
        }
        .gene-square{
            width:28px;height:28px;border-radius:6px;
            background:linear-gradient(135deg,#73b8ff,#2575e8);
            box-shadow:3px 3px 7px rgba(0,0,0,0.28),inset -2px -2px 5px rgba(0,0,0,0.18);
            color:#fff;font-weight:bold;font-size:13px;
            display:flex;align-items:center;justify-content:center;
        }

        .combine-center{width:100%;text-align:center;margin-top:20px;height:40px;}
        .combine-text{font-size:22px;color:#1a2b48;font-weight:700;letter-spacing:0.5px;}

        .control-bar{
            display:flex;justify-content:center;align-items:center;gap:10px;
            margin-bottom:30px;flex-wrap:wrap;padding:14px;
            background:#ffffff;border-radius:12px;
            box-shadow:0 3px 12px rgba(0,0,0,0.1);
            max-width:1000px;margin-left:auto;margin-right:auto;
        }
        .control-bar button{
            padding:10px 16px;border:none;border-radius:8px;
            font-size:16px;font-weight:600;cursor:pointer;color:#fff;
            transition:all 0.25s ease;
            box-shadow:0 5px 0px, 0 8px 12px rgba(0,0,0,0.2);
            min-width:70px;position:relative;top:0;
        }
        .control-bar button:hover{top:2px;box-shadow:0 3px 0px, 0 5px 8px rgba(0,0,0,0.15);}
        .control-bar button:active{top:5px;box-shadow:0 0px 0px, 0 3px 6px rgba(0,0,0,0.1);}
        .btn-run{background:#4080e8;box-shadow:0 5px 0 #2d65c7, 0 8px 12px rgba(0,0,0,0.2);}
        .btn-pause{background:#f54444;box-shadow:0 5px 0 #d43434, 0 8px 12px rgba(0,0,0,0.2);}
        .btn-reset{background:#36d366;box-shadow:0 5px 0 #28b04f, 0 8px 12px rgba(0,0,0,0.2);}
        button:disabled{background:#c0c8d8 !important;box-shadow:0 5px 0 #a0a8b8 !important;cursor:not-allowed;top:0 !important;}
        .num-input{width:80px;padding:10px;border:1px solid #d0d8e8;border-radius:8px;font-size:16px;text-align:center;outline:none;transition:border 0.2s;}
        .num-input:focus{border-color:#4080e8;}

        .data-wrapper{display:flex;justify-content:center;gap:20px;align-items:flex-start;flex-wrap:wrap;}
        .result-panel{width:520px;background:#fff;padding:22px;border-radius:14px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
        .chart-area{width:380px;display:flex;flex-direction:column;gap:30px;}
        .chart-box{width:100%;height:240px;background:#fff;padding:12px;border-radius:14px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
        h3{font-size:18px;color:#233455;margin-bottom:15px;border-left:5px solid #3b7cd3;padding-left:10px;}
        h4{font-size:15px;color:#444;margin:8px 0;text-align:center;}

        table{width:100%;border-collapse:collapse;font-size:13px;}
        th,td{border:1px solid #e1e6f0;padding:8px;text-align:center;}
        th{background:#f2f6fc;color:#233455;font-weight:600;}
        .ratio-show{font-size:17px;font-weight:bold;color:#d83030;margin:15px 0;padding:10px;background:#fff5f5;border-radius:8px;}
        .ratio-text{font-size:15px;font-weight:bold;color:#d83030;}
        .small-font{font-size:11px;}

        @keyframes downMove{0%{transform:translateY(-18px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
        .down-animate{animation:downMove 0.5s ease forwards;}
    </style>
</head>
<body>
    <h1>两对等位基因自由组合的模拟实验</h1>
    <div class="experiment-main">
        <div class="group-box">
            <div class="organ-label">雌性生殖器官</div>
            <div class="bucket">
                <span class="bucket-title">雌配子储存桶</span>
                <div class="gene-area" id="fZoneA"></div>
                <div class="split-line"></div>
                <div class="female-b-box" id="fZoneB"></div>
            </div>
        </div>
        <div class="group-box">
            <div class="organ-label">雄性生殖器官</div>
            <div class="bucket bucket-male">
                <span class="bucket-title">雄配子储存桶</span>
                <div class="male-a-box" id="mZoneA"></div>
                <div class="split-line"></div>
                <div class="gene-area" id="mZoneB"></div>
            </div>
        </div>
    </div>
    <div class="experiment-main">
        <div class="gene-produce-box" id="femaleProduceBox"><span class="gen-label">雌配子基因型</span></div>
        <div class="gene-produce-box" id="maleProduceBox"><span class="gen-label">雄配子基因型</span></div>
    </div>
    <div class="combine-center"><div class="combine-text" id="combineText"></div></div>
    <div class="control-bar">
        <button class="btn-run" onclick="startSim(1)">单次实验</button>
        <button class="btn-run" onclick="startSim(10)">10次模拟</button>
        <button class="btn-run" onclick="startSim(100)">100次模拟</button>
        <button class="btn-run" onclick="startSim(1000)">1000次模拟</button>
        <input class="num-input" type="number" id="customNum" min="1" value="50">
        <button class="btn-run" onclick="customStart()">开始</button>
        <button class="btn-pause" id="pauseBtn" disabled onclick="togglePause()">暂停</button>
        <button class="btn-reset" onclick="resetAll()">重置清零</button>
    </div>
    <div class="data-wrapper">
        <div class="result-panel">
            <h3>实验统计数据</h3>
            <p>累计实验总次数：<strong id="totalTimes">0</strong></p>
            <h4>雌雄配子数量统计</h4>
            <table>
                <tr><th>配子类型</th><th>AB</th><th>Ab</th><th>aB</th><th>ab</th><th>配子基因型比例</th></tr>
                <tr><td>雌配子</td><td id="fAB">0</td><td id="fAb">0</td><td id="faB">0</td><td id="fab">0</td><td class="ratio-text" id="femaleGeneRatio">0:0:0:0</td></tr>
                <tr><td>雄配子</td><td id="mAB">0</td><td id="mAb">0</td><td id="maB">0</td><td id="mab">0</td><td class="ratio-text" id="maleGeneRatio">0:0:0:0</td></tr>
            </table>
            <h4>九种子代基因型统计</h4>
            <table>
                <tr><th>基因型</th><th>AaBb</th><th>AABb</th><th>AaBB</th><th>Aabb</th><th>aaBb</th><th>AABB</th><th>AAbb</th><th>aaBB</th><th>aabb</th></tr>
                <tr class="small-font"><td>数量</td><td id="zyAaBb">0</td><td id="zyAABb">0</td><td id="zyAaBB">0</td><td id="zyAabb">0</td><td id="zyaaBb">0</td><td id="zyAABB">0</td><td id="zyAAbb">0</td><td id="zyaaBB">0</td><td id="zyaabb">0</td></tr>
                <tr class="small-font"><td class="ratio-text">比例</td><td class="ratio-text" id="ratAaBb">-</td><td class="ratio-text" id="ratAABb">-</td><td class="ratio-text" id="ratAaBB">-</td><td class="ratio-text" id="ratAabb">-</td><td class="ratio-text" id="rataaBb">-</td><td class="ratio-text" id="ratAABB">-</td><td class="ratio-text" id="ratAAbb">-</td><td class="ratio-text" id="rataaBB">-</td><td class="ratio-text" id="rataabb">-</td></tr>
            </table>
            <div class="ratio-show">性状分离比：双显：仅A显：仅B显：双隐 = <span class="ratio-text" id="phenRatio">0:0:0:0</span></div>
        </div>
        <div class="chart-area">
            <div class="chart-box"><h4>九种子代基因型比例</h4><canvas id="zyChart"></canvas></div>
            <div class="chart-box"><h4>性状分离比</h4><canvas id="phenChart"></canvas></div>
        </div>
    </div>

    <script>
        const fZoneA=document.getElementById('fZoneA'),fZoneB=document.getElementById('fZoneB');
        const mZoneA=document.getElementById('mZoneA'),mZoneB=document.getElementById('mZoneB');
        const femaleProduceBox=document.getElementById('femaleProduceBox');
        const maleProduceBox=document.getElementById('maleProduceBox');
        const combineText=document.getElementById('combineText');
        const pauseBtn=document.getElementById('pauseBtn');

        let zyChart,phenChart;
        let runFlag=false,pauseFlag=false;
        let total=0;
        const speed1=500,speed2=120,speed3=50,speed4=10;
        let baseSpeed=speed1;

        let femaleG={AB:0,Ab:0,aB:0,ab:0};
        let maleG={AB:0,Ab:0,aB:0,ab:0};
        let zygote={AABB:0,AABb:0,AAbb:0,AaBB:0,AaBb:0,Aabb:0,aaBB:0,aaBb:0,aabb:0};
        let phen={doubleShow:0,onlyA:0,onlyB:0,doubleHide:0};
        const zyKeys=['AaBb','AABb','AaBB','Aabb','aaBb','AABB','AAbb','aaBB','aabb'];

        // 雌桶 A/a：2A + 2a
        const geneAFemale = ['A','A','a','a'];
        // 雌桶 B/b：2B + 2b（4个，每行2个）
        const geneBFemale = ['B','B','b','b'];

        // 雄桶 A/a：4A + 4a（8个，每行3个）
        const geneAMale = ['A','A','A','A','a','a','a','a'];
        // 雄桶 B/b
        const geneBMale = ['B','B','B','B','b','b','b','b'];

        function shuffle(arr){
            let a=[...arr];
            for(let i=a.length-1;i>0;i--){
                let j=Math.floor(Math.random()*(i+1));
                [a[i],a[j]]=[a[j],a[i]];
            }
            return a;
        }

        function initBucket(){
            fZoneA.innerHTML='';fZoneB.innerHTML='';
            let fA = shuffle(geneAFemale);
            let fB = shuffle(geneBFemale);
            fA.forEach(txt=>fZoneA.appendChild(createGene(txt,'round')));
            fB.forEach(txt=>fZoneB.appendChild(createGene(txt,'square')));

            mZoneA.innerHTML='';mZoneB.innerHTML='';
            let mA = shuffle(geneAMale);
            let mB = shuffle(geneBMale);
            mA.forEach(txt=>mZoneA.appendChild(createGene(txt,'round')));
            mB.forEach(txt=>mZoneB.appendChild(createGene(txt,'square')));

            femaleProduceBox.innerHTML='<span class="gen-label">雌配子基因型</span>';
            maleProduceBox.innerHTML='<span class="gen-label">雄配子基因型</span>';
            combineText.innerText="";
        }

        function createGene(txt,type){
            let el=document.createElement('div');
            el.className=type==='round'?'gene-round':'gene-square';
            el.innerText=txt;
            return el;
        }

        function pickBall(box){
            let list = [...box.children];
            if(list.length===0) {initBucket();list = [...box.children];}
            let idx = Math.floor(Math.random()*list.length);
            let ball = list[idx];
            ball.remove();
            return { ball, box };
        }

        function backBall(obj){
            if(obj) obj.box.appendChild(obj.ball);
        }

        async function oneRound(){
            if(pauseFlag||!runFlag)return;
            let fY=pickBall(fZoneA),fB=pickBall(fZoneB);await delay(baseSpeed);
            femaleProduceBox.innerHTML='<span class="gen-label">雌配子基因型</span>';
            let fyClone=fY.ball.cloneNode(true),fbClone=fB.ball.cloneNode(true);
            fyClone.classList.add('down-animate');fbClone.classList.add('down-animate');
            femaleProduceBox.append(fyClone,fbClone);
            let fGene=fY.ball.innerText+fB.ball.innerText;
            await delay(baseSpeed);

            let mY=pickBall(mZoneA),mB=pickBall(mZoneB);await delay(baseSpeed);
            maleProduceBox.innerHTML='<span class="gen-label">雄配子基因型</span>';
            let myClone=mY.ball.cloneNode(true),mbClone=mB.ball.cloneNode(true);
            myClone.classList.add('down-animate');mbClone.classList.add('down-animate');
            maleProduceBox.append(myClone,mbClone);
            let mGene=mY.ball.innerText+mB.ball.innerText;
            await delay(baseSpeed);

            let resGene=mergeGene(fGene,mGene);
            combineText.innerText=`${fGene} + ${mGene} = ${resGene}`;
            await delay(baseSpeed);

            femaleG[fGene]++;maleG[mGene]++;zygote[resGene]++;judgePhen(resGene);total++;

            backBall(fY);backBall(fB);backBall(mY);backBall(mB);
            await delay(baseSpeed);

            femaleProduceBox.innerHTML='<span class="gen-label">雌配子基因型</span>';
            maleProduceBox.innerHTML='<span class="gen-label">雄配子基因型</span>';
            combineText.innerText="";
            updateData();updateAllCharts();
        }

        function mergeGene(f,m){
            let a = [f[0],m[0]].sort().join('');
            let b = [f[1],m[1]].sort().join('');
            return a+b;
        }

        function judgePhen(g){
            if(g.includes('A')&&g.includes('B')) phen.doubleShow++;
            else if(g.includes('A')) phen.onlyA++;
            else if(g.includes('B')) phen.onlyB++;
            else phen.doubleHide++;
        }

        async function startSim(times){
            if(runFlag)return;
            if(times===1)baseSpeed=speed1;
            else if(times===10)baseSpeed=speed2;
            else if(times===100)baseSpeed=speed3;
            else baseSpeed=speed4;
            runFlag=true;pauseFlag=false;pauseBtn.disabled=false;
            for(let i=0;i<times;i++){
                if(!runFlag)break;
                while(pauseFlag)await delay(50);
                await oneRound();
            }
            runFlag=false;pauseBtn.disabled=true;pauseBtn.innerText='暂停';
        }

        function customStart(){
            let num=parseInt(document.getElementById('customNum').value)||1;
            startSim(num);
        }

        function togglePause(){
            pauseFlag=!pauseFlag;
            pauseBtn.innerText=pauseFlag?'继续':'暂停';
        }

        function resetAll(){
            runFlag=false;pauseFlag=false;pauseBtn.disabled=true;pauseBtn.innerText='暂停';total=0;
            femaleG={AB:0,Ab:0,aB:0,ab:0};
            maleG={AB:0,Ab:0,aB:0,ab:0};
            zygote={AABB:0,AABb:0,AAbb:0,AaBB:0,AaBb:0,Aabb:0,aaBB:0,aaBb:0,aabb:0};
            phen={doubleShow:0,onlyA:0,onlyB:0,doubleHide:0};
            initBucket();updateData();resetAllCharts();
        }

        function calcRatioByTwoMinAvg(arr){
            const valid = arr.filter(v => v > 0);
            if(valid.length === 0){return arr.map(() => 0).join(':');}
            valid.sort((a,b) => a - b);
            let divisor = valid.length === 1 ? valid[0] : (valid[0] + valid[1]) / 2;
            return arr.map(v => Math.round(v / divisor)).join(':');
        }

        function calcRatioByMinNum(arr){
            const valid = arr.filter(v => v > 0);
            if(valid.length === 0){return arr.map(() => 0).join(':');}
            const minNum = Math.min(...valid);
            return arr.map(v => Math.round(v / minNum)).join(':');
        }

        function getPhenRatio(){
            const arr=[phen.doubleShow,phen.onlyA,phen.onlyB,phen.doubleHide];
            return calcRatioByMinNum(arr);
        }

        function updateData(){
            document.getElementById('totalTimes').innerText=total;
            document.getElementById('fAB').innerText=femaleG.AB;document.getElementById('fAb').innerText=femaleG.Ab;
            document.getElementById('faB').innerText=femaleG.aB;document.getElementById('fab').innerText=femaleG.ab;
            document.getElementById('mAB').innerText=maleG.AB;document.getElementById('mAb').innerText=maleG.Ab;
            document.getElementById('maB').innerText=maleG.aB;document.getElementById('mab').innerText=maleG.ab;

            document.getElementById('femaleGeneRatio').innerText=calcRatioByTwoMinAvg([femaleG.AB,femaleG.Ab,femaleG.aB,femaleG.ab]);
            document.getElementById('maleGeneRatio').innerText=calcRatioByTwoMinAvg([maleG.AB,maleG.Ab,maleG.aB,maleG.ab]);
            document.getElementById('phenRatio').innerText=getPhenRatio();

            let vals=zyKeys.map(k=>zygote[k]);
            let ratArr=calcRatioByTwoMinAvg(vals).split(':');
            zyKeys.forEach((k,i)=>{
                document.getElementById('zy'+k).innerText=zygote[k];
                document.getElementById('rat'+k).innerText=ratArr[i];
            });
        }

        const valueLabelPlugin = {
            id: 'valueLabels',
            afterDatasetsDraw: (chart) => {
                const ctx = chart.ctx;
                ctx.save();
                ctx.font = 'bold 13px Microsoft YaHei';
                ctx.fillStyle = '#222';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                const data = chart.data.datasets[0].data;
                const meta = chart.getDatasetMeta(0);
                meta.data.forEach((bar, index) => {
                    const val = data[index];
                    if (val !== undefined && val !== null && val !== 0) {
                        ctx.fillText(val, bar.x, bar.y - 5);
                    }
                });
                ctx.restore();
            }
        };

        function initAllCharts(){
            const zyOpt = {
                responsive:true,maintainAspectRatio:false,
                plugins:[valueLabelPlugin],
                legend: { display: false },
                scales:{
                    x:{ ticks:{font:{size:12,weight:'bold'}}, grid:{display:false} },
                    y:{ beginAtZero:true, title:{display:true,text:'比例'}, ticks:{precision:0} }
                }
            };
            zyChart = new Chart(document.getElementById('zyChart'),{
                type:'bar',data:{labels:zyKeys,datasets:[{data:Array(9).fill(0),backgroundColor:['#ff9999','#ff6666','#ff3333','#99ccff','#66b3ff','#3399ff','#c2e0c2','#99e699','#66ff66']}]},options:zyOpt
            });

            const phenOpt = {
                responsive:true,maintainAspectRatio:false,
                plugins:[valueLabelPlugin],
                legend: { display: false },
                scales:{
                    x:{ ticks:{font:{size:13,weight:'bold'}}, grid:{display:false} },
                    y:{ beginAtZero:true, title:{display:true,text:'比例'}, ticks:{precision:0} }
                }
            };
            phenChart = new Chart(document.getElementById('phenChart'),{
                type:'bar',data:{
                    labels:['双显','仅A显','仅B显','双隐'],
                    datasets:[{data:[0,0,0,0],backgroundColor:['#e74c3c','#27ae60','#3498db','#9b59b6']}]
                },options:phenOpt
            });
        }

        function updateAllCharts(){
            let zyVals=zyKeys.map(k=>zygote[k]);
            let zyRatio=calcRatioByTwoMinAvg(zyVals).split(':').map(Number);
            zyChart.data.datasets[0].data=zyRatio;

            let phenVals=[phen.doubleShow,phen.onlyA,phen.onlyB,phen.doubleHide];
            let phenRatio=calcRatioByMinNum(phenVals).split(':').map(Number);
            phenChart.data.datasets[0].data=phenRatio;

            zyChart.update();phenChart.update();
        }

        function resetAllCharts(){
            zyChart.data.datasets[0].data=Array(9).fill(0);
            phenChart.data.datasets[0].data=[0,0,0,0];
            zyChart.update();phenChart.update();
        }

        function delay(ms){return new Promise(r=>setTimeout(r,ms));}
        window.onload=()=>{initBucket();initAllCharts();};
    </script>
</body>
</html>
